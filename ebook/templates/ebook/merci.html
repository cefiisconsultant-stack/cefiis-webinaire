<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Merci — Votre ebook est prêt</title>
<style>
  body{ font-family:'Inter',sans-serif; background:#16233A; color:#F7F3E9; min-height:100vh;
        display:flex; align-items:center; justify-content:center; text-align:center; margin:0; padding:24px; }
  .box{ max-width:480px; }
  h1{ font-family:'Fraunces',serif; font-size:28px; margin-bottom:16px; }
  p{ color:#B9C2D0; margin-bottom:28px; line-height:1.6; }
  a.btn{ background:#B08D57; color:#1B140A; padding:16px 32px; border-radius:3px; text-decoration:none; font-weight:700; }
</style>
</head>
<body>
  <div class="box">
    <h1>Merci {{ achat.prenom }} 🎉</h1>
    <p>Votre paiement a été confirmé. Votre ebook est prêt — vous en recevrez aussi une copie par email à {{ achat.email }}.</p>
    <a class="btn" href="{% url 'telecharger_ebook' achat.token_telechargement %}">Télécharger mon ebook</a>
  </div>
</body>
</html>
